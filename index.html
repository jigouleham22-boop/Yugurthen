<!DOCTYPE html>  <html lang="fr">  
<head>  
<meta charset="UTF-8">  
<title>Pour ma belle sœur❤️</title>  <style>  
  
body{  
margin:0;  
padding:0;  
background: linear-gradient(to bottom, #ffc1cc, #ffdee9);
height:100vh;  
overflow:hidden;  
font-family:Arial;  
text-align:center;  
color:white;  
}  
  
h1{  
margin-top:20%;  
font-size:45px;  
color:#ff4da6;  
animation: glow 2s infinite alternate;  
}  
  
p{  
font-size:22px;  
margin-top:20px;  
}  
  
@keyframes glow{  
from{ text-shadow:0 0 10px pink;}  
to{ text-shadow:0 0 30px red;}  
}  
  
img{  
margin-top:20px;  
width:250px;  
border-radius:20px;  
box-shadow:0 0 20px pink;  
}  
  
/* hearts animation */  
  
.heart{  
position:absolute;  
color:red;  
font-size:20px;  
animation: float 6s linear infinite;  
}  
  
@keyframes float{  
0%{  
transform:translateY(100vh);  
opacity:1;  
}  
100%{  
transform:translateY(-10vh);  
opacity:0;  
}  
}  
  
</style>  </head>  <body>  <h1>Joyeux anniversaire ma belle maman ❤️</h1>  Merci pour tout l'amour et le soutien que tu m'as donné chaque jour.<br>
Tu es la personne la plus précieuse dans ma vie 🌸</p>💕

<div style="font-size:150px; color:#ff4d6d; margin-top:20px; text-shadow: 0 0 15px #ffccd5;">
❤️
</div>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">  
</audio>  <script>  
  
function createHeart(){  
const heart=document.createElement("div");  
heart.classList.add("heart");  
heart.innerHTML="💞";  
heart.style.left=Math.random()*100+"vw";  
heart.style.fontSize=Math.random()*20+10+"px";  
heart.style.animationDuration=Math.random()*3+3+"s";  
  
document.body.appendChild(heart);  
  
setTimeout(()=>{  
heart.remove();  
},6000);  
}  
  
setInterval(createHeart,300);  
  
</script>  </body>  
</html>
